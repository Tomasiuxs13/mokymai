<html lang="en">

    <link rel="stylesheet" href="student.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />

<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <a href="../index.html" class="nav-logo"
                style="text-align:center;display:block;margin-bottom:var(--space-xs);">Web<span>Genius</span></a>
            <p class="login-subtitle">Student Portal</p>

            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="student@webgenius.com" required autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        autocomplete="current-password" />
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">
                    Sign In
                </button>
                <div class="login-error" id="loginError"></div>
            </form>

            <a href="../index.html" class="login-back">← Back to Web Genius</a>
        </div>
    </div>

    <script src="../supabase.js"></script>
    <script>
        // Ensure supabase.js is loaded
        async function ensureSupabase() {
            if (typeof signIn === 'function') return;
            const res = await fetch('../supabase.js');
            const code = await res.text();
            const s = document.createElement('script');
            s.textContent = code;
            document.head.appendChild(s);
            await new Promise(r => setTimeout(r, 100));
            if (typeof signIn !== 'function') throw new Error('Failed to load auth.');
        }

        // If already logged in as student, redirect
        (async () => {
            try {
                await ensureSupabase();
                const profile = await getProfile();
                if (profile && profile.role === 'student') {
                    window.location.href = 'index.html';
                }
            } catch (e) { }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.textContent = '';
            btn.textContent = 'Signing in…';
            btn.disabled = true;

            try {
                await ensureSupabase();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await signIn(email, password);

                // Check role
                const profile = await getProfile();
                if (!profile) {
                    await signOut();
                    throw new Error('Profile not found.');
                }

                // Allow students
                if (profile.role !== 'student') {
                    await signOut();
                    throw new Error('Access denied. Student account required.');
                }

                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = err.message || 'Login failed. Please try again.';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
