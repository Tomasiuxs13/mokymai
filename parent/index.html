<body>

    <div class="admin-layout">

        <!-- ======== SIDEBAR ======== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="nav-logo">Web<span>Genius</span></a>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Overview</div>
                <a href="#dashboard" data-section="dashboard" class="active">
                    <span class="nav-icon">📊</span> Dashboard
                </a>

                <div class="nav-section-label">My Children</div>
                <a href="#children" data-section="children">
                    <span class="nav-icon">👨‍👧‍👦</span> Children
                </a>
                <a href="#courses" data-section="courses">
                    <span class="nav-icon">📚</span> Course Progress
                </a>
                <a href="#assignments" data-section="assignments">
                    <span class="nav-icon">📝</span> Assignments
                </a>
                <a href="#schedule" data-section="schedule">
                    <span class="nav-icon">📅</span> Schedule
                </a>
                <a href="#achievements" data-section="achievements">
                    <span class="nav-icon">🏆</span> Achievements
                </a>

                <a href="#profile" data-section="profile">
                    <span class="nav-icon">👤</span> Profile
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="admin-user">
                    <div class="admin-avatar" id="userAvatar">P</div>
                    <div class="admin-user-info">
                        <div class="admin-name" id="userName">Parent</div>

            <header class="admin-topbar">

                </div>
                <div class="topbar-actions">
                    <!-- Child switcher -->
                    <select id="childSwitcher" class="child-switcher" style="display:none;">

                    </select>
                    <a href="../index.html" class="btn-sm btn-primary" target="_blank"
